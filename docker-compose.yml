services:
  not-mouldy:
    build: .
    restart: unless-stopped
    devices:
      - /dev/gpiochip0:/dev/gpiochip0
    volumes:
      # SQLite DB — same path as native Grafana expects
      - /var/lib/grafana/sqlite:/var/lib/grafana/sqlite
    environment:
      LOG_TO_FILE: "0"
      RETENTION_DAYS: "180"
      SENSOR_RETRY_DELAY_SECONDS: "30"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
